services:
  epf:
    build: .
    ports:
      - "15151:5000"
    environment:
      - IMMICH_API_KEY=your-api-key-here
      # - APP_PASSWORD=your-password-here   # Uncomment and set to enable HTTP Basic Auth (username: admin)

    volumes:
      # Immich photo cache + tracking.txt
      - ./photos:/data/photos

      # Local photos — drop images here to use the local source
      - ./local_photos:/data/local_photos

      # Config — persists settings changed via the /setting UI
      - ./config:/data/config
