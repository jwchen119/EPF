name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.8.4

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format --check
        run: ruff format --check .

  typecheck:
    name: Typecheck (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pyright
        run: pyright

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libraw-dev fonts-dejavu-core

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest cython

      - name: Build Cython extension
        run: |
          sudo apt-get install -y --no-install-recommends python3-dev gcc
          cython cpy.pyx && \
          gcc -shared -fPIC -O2 \
              $(python3-config --includes) \
              -I$(python3 -c "import numpy; print(numpy.get_include())") \
              cpy.c -o cpy.so && \
          rm cpy.c || echo "Cython build failed — pure-Python fallback will be used"

      - name: Run pytest
        run: pytest tests/ -v
